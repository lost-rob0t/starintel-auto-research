name: Star-Lang Dispatcher Idempotency Identity

on:
  pull_request:
    paths:
      - "prototypes/star-lang/common-lisp/dispatcher-idempotency-identity-prototype.lisp"
      - "prototypes/star-lang/common-lisp/dispatcher-idempotency-identity-tests.lisp"
      - "prototypes/star-lang/common-lisp/dispatcher-idempotency-validation-order-tests.lisp"
      - "prototypes/star-lang/common-lisp/bbp-remoting-runtime-example.lisp"
      - ".github/workflows/star-lang-dispatch-idempotency-identity.yml"
  push:
    branches:
      - main
    paths:
      - "prototypes/star-lang/common-lisp/dispatcher-idempotency-identity-prototype.lisp"
      - "prototypes/star-lang/common-lisp/dispatcher-idempotency-identity-tests.lisp"
      - "prototypes/star-lang/common-lisp/dispatcher-idempotency-validation-order-tests.lisp"
      - "prototypes/star-lang/common-lisp/bbp-remoting-runtime-example.lisp"
      - ".github/workflows/star-lang-dispatch-idempotency-identity.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install --yes sbcl
      - name: Check identity Lisp form balance
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path('prototypes/star-lang/common-lisp/dispatcher-idempotency-identity-prototype.lisp'),
              Path('prototypes/star-lang/common-lisp/dispatcher-idempotency-identity-tests.lisp'),
              Path('prototypes/star-lang/common-lisp/dispatcher-idempotency-validation-order-tests.lisp'),
              Path('prototypes/star-lang/common-lisp/bbp-remoting-runtime-example.lisp'),
          ]

          for path in paths:
              text = path.read_text(encoding='utf-8')
              stack = []
              in_string = False
              escaped = False
              in_comment = False
              line = 1
              for char in text:
                  if char == '\n':
                      line += 1
                      in_comment = False
                      continue
                  if in_comment:
                      continue
                  if in_string:
                      if escaped:
                          escaped = False
                      elif char == '\\':
                          escaped = True
                      elif char == '"':
                          in_string = False
                      continue
                  if char == ';':
                      in_comment = True
                  elif char == '"':
                      in_string = True
                  elif char == '(':
                      stack.append(line)
                  elif char == ')':
                      if not stack:
                          raise SystemExit(f'{path}:{line}: unmatched closing parenthesis')
                      stack.pop()
              if in_string:
                  raise SystemExit(f'{path}: unterminated string')
              if stack:
                  raise SystemExit(f'{path}:{stack[-1]}: unclosed parenthesis')
              print(f'{path}: balanced')
          PY
      - name: Run dispatcher identity suite
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/dispatcher-idempotency-identity-tests.lisp \
            2>&1 | tee star-lang-dispatch-idempotency-identity.log
          sbcl --script prototypes/star-lang/common-lisp/dispatcher-idempotency-validation-order-tests.lisp \
            2>&1 | tee star-lang-dispatch-idempotency-validation-order.log
      - name: Upload identity test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: star-lang-dispatch-idempotency-identity
          path: |
            star-lang-dispatch-idempotency-identity.log
            star-lang-dispatch-idempotency-validation-order.log
          if-no-files-found: warn
