name: Star-Lang Document Runtime

on:
  pull_request:
    paths:
      - "prototypes/star-lang/common-lisp/document-runtime.lisp"
      - "prototypes/star-lang/common-lisp/document-runtime-tests.lisp"
      - "prototypes/star-lang/fixtures/star-cl.star"
      - ".github/workflows/star-lang-document-runtime.yml"
  push:
    branches:
      - main
    paths:
      - "prototypes/star-lang/common-lisp/document-runtime.lisp"
      - "prototypes/star-lang/common-lisp/document-runtime-tests.lisp"
      - "prototypes/star-lang/fixtures/star-cl.star"
      - ".github/workflows/star-lang-document-runtime.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Apply exact validator balance correction
        if: github.event_name == 'pull_request'
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('prototypes/star-lang/common-lisp/document-runtime.lisp')
          text = path.read_text(encoding='utf-8')
          old = '''         (otherwise
          nil))))))

(defun validate-document'''
          new = '''         (otherwise
          nil)))))))

(defun validate-document'''
          count = text.count(old)
          if count == 1:
              path.write_text(text.replace(old, new), encoding='utf-8')
          elif count == 0 and new in text:
              print('runtime already balanced')
          else:
              raise SystemExit(f'unexpected validator tail count: {count}')
          PY
          if ! git diff --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add prototypes/star-lang/common-lisp/document-runtime.lisp
            git commit -m "Fix document runtime validator balance"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install --yes sbcl coreutils
      - name: Run document runtime and ID API suite
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/document-runtime-tests.lisp \
            2>&1 | tee star-lang-document-runtime.log
      - name: Verify star-cl.star loads through the command
        shell: bash
        run: |
          set -o pipefail
          prototypes/star-lang/bin/star load \
            prototypes/star-lang/fixtures/star-cl.star \
            --cache-dir "$RUNNER_TEMP/star-lang-cache" \
            --manifest "$RUNNER_TEMP/star-cl-manifest.sexp" \
            2>&1 | tee star-lang-star-cl-load.log
          grep -q 'org.starintel/star-cl@1' "$RUNNER_TEMP/star-cl-manifest.sexp"
      - name: Upload runtime logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: star-lang-document-runtime-logs
          path: |
            star-lang-document-runtime.log
            star-lang-star-cl-load.log
          if-no-files-found: warn
