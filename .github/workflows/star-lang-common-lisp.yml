name: Star-Lang Common Lisp Research

on:
  pull_request:
    paths:
      - "prototypes/star-lang/common-lisp/**"
      - "prototypes/star-lang/fixtures/**"
      - ".github/workflows/star-lang-common-lisp.yml"
  push:
    branches:
      - main
    paths:
      - "prototypes/star-lang/common-lisp/**"
      - "prototypes/star-lang/fixtures/**"
      - ".github/workflows/star-lang-common-lisp.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install --yes sbcl
      - name: Run existing Common Lisp baseline
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/tests.lisp \
            2>&1 | tee star-lang-baseline.log
      - name: Run specification and domain suite
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/spec-domain-tests.lisp \
            2>&1 | tee star-lang-spec-domain.log
      - name: Run normalized IR and cl-gserver adapter suite
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/compiler-ir-tests.lisp \
            2>&1 | tee star-lang-compiler-ir.log
      - name: Run core surface and wire protocol suite
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/core-surface-tests.lisp \
            2>&1 | tee star-lang-core-surface.log
      - name: Run core semantic validation suite
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/core-semantics-tests.lisp \
            2>&1 | tee star-lang-core-semantics.log
      - name: Run canonical JSON and binding generator suite
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/canonical-json-binding-tests.lisp \
            2>&1 | tee star-lang-canonical-json-bindings.log
          python -m json.tool star-lang-fec-manifest.json >/dev/null
          python -m json.tool star-lang-fec-envelope.json >/dev/null
          python -m py_compile star_lang_fec.py
      - name: Run message lifecycle suite
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/message-lifecycle-tests.lisp \
            2>&1 | tee star-lang-message-lifecycle.log
          for file in star-lang-lifecycle-*.json; do
            python -m json.tool "$file" >/dev/null
          done
          python -m py_compile star_protocol.py
      - name: Upload Common Lisp test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: star-lang-common-lisp-research-logs
          path: |
            star-lang-baseline.log
            star-lang-spec-domain.log
            star-lang-compiler-ir.log
            star-lang-core-surface.log
            star-lang-core-semantics.log
            star-lang-canonical-json-bindings.log
            star-lang-message-lifecycle.log
            star-lang-fec-manifest.json
            star-lang-fec-envelope.json
            star_lang_fec.py
            star_lang_fec.ts
            star-lang-lifecycle-*.json
            star_protocol.py
            star_protocol.ts
          if-no-files-found: warn
