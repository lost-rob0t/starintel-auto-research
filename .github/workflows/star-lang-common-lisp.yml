name: Star-Lang Common Lisp Core

on:
  pull_request:
    paths:
      - "prototypes/star-lang/common-lisp/**"
      - "prototypes/star-lang/emacs/**"
      - "prototypes/star-lang/examples/**"
      - "prototypes/star-lang/fixtures/**"
      - ".github/workflows/star-lang-common-lisp.yml"
  push:
    branches:
      - main
    paths:
      - "prototypes/star-lang/common-lisp/**"
      - "prototypes/star-lang/emacs/**"
      - "prototypes/star-lang/examples/**"
      - "prototypes/star-lang/fixtures/**"
      - ".github/workflows/star-lang-common-lisp.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install --yes sbcl
      - name: Run Star-Lang ASDF tests
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/run-tests.lisp 2>&1 | tee star-lang-test.log
      - name: Upload Star-Lang test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: star-lang-test-log
          path: star-lang-test.log
          if-no-files-found: error

  emacs-tooling:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install --yes emacs-nox
      - name: Byte-compile Star-Lang mode
        shell: bash
        run: |
          set -o pipefail
          emacs --batch -Q \
            -L prototypes/star-lang/emacs \
            -f batch-byte-compile \
            prototypes/star-lang/emacs/star-lang-mode.el \
            2>&1 | tee star-lang-emacs-byte-compile.log
      - name: Run Star-Lang ERT tests
        shell: bash
        run: |
          set -o pipefail
          emacs --batch -Q \
            -L prototypes/star-lang/emacs \
            -l prototypes/star-lang/emacs/star-lang-mode-tests.el \
            -f ert-run-tests-batch-and-exit \
            2>&1 | tee star-lang-emacs-ert.log
      - name: Upload Emacs tooling logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: star-lang-emacs-tooling-logs
          path: |
            star-lang-emacs-byte-compile.log
            star-lang-emacs-ert.log
          if-no-files-found: error

  sento-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install SBCL and build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes sbcl curl git
      - name: Install Quicklisp
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            --output quicklisp.lisp \
            https://beta.quicklisp.org/quicklisp.lisp
          sbcl --non-interactive \
            --load quicklisp.lisp \
            --eval '(quicklisp-quickstart:install :path (merge-pathnames "quicklisp/" (user-homedir-pathname)))' \
            --quit
      - name: Pin Sento upstream
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/quicklisp/local-projects"
          git clone https://github.com/mdbergmann/cl-gserver.git \
            "$HOME/quicklisp/local-projects/cl-gserver"
          git -C "$HOME/quicklisp/local-projects/cl-gserver" \
            checkout a889b8375709ca9396bba5d06b6e460689a23716
      - name: Run real Sento integration
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/run-sento-integration.lisp \
            2>&1 | tee star-lang-sento-integration.log
      - name: Upload Sento integration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: star-lang-sento-integration-log
          path: star-lang-sento-integration.log
          if-no-files-found: error

  data-adapters-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      couchdb:
        image: couchdb:3.4
        env:
          COUCHDB_USER: admin
          COUCHDB_PASSWORD: password
        ports:
          - 5984:5984
      rabbitmq:
        image: rabbitmq:3.13
        ports:
          - 5672:5672
    steps:
      - uses: actions/checkout@v6
      - name: Install Lisp and native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            sbcl curl git librabbitmq-dev netcat-openbsd
      - name: Wait for data services
        shell: bash
        run: |
          set -euo pipefail
          timeout 90 bash -c \
            'until curl --fail --silent --user admin:password http://127.0.0.1:5984/_up; do sleep 1; done'
          timeout 90 bash -c \
            'until nc -z 127.0.0.1 5672; do sleep 1; done'
      - name: Seed CouchDB fixtures
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --user admin:password \
            --request PUT \
            http://127.0.0.1:5984/star_lang
          curl --fail --silent --show-error \
            --user admin:password \
            --header 'Content-Type: application/json' \
            --request PUT \
            --data '{"type":"person","name":"Ada"}' \
            http://127.0.0.1:5984/star_lang/ada
          curl --fail --silent --show-error \
            --user admin:password \
            --header 'Content-Type: application/json' \
            --request PUT \
            --data '{"type":"person","name":"Grace"}' \
            http://127.0.0.1:5984/star_lang/grace
      - name: Install Quicklisp
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            --output quicklisp.lisp \
            https://beta.quicklisp.org/quicklisp.lisp
          sbcl --non-interactive \
            --load quicklisp.lisp \
            --eval '(quicklisp-quickstart:install :path (merge-pathnames "quicklisp/" (user-homedir-pathname)))' \
            --quit
      - name: Pin Cl-Couch and cl-rabbit upstreams
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/quicklisp/local-projects"
          git clone https://github.com/ryszard/Cl-Couch.git \
            "$HOME/quicklisp/local-projects/Cl-Couch"
          git -C "$HOME/quicklisp/local-projects/Cl-Couch" \
            checkout de6900e38395dac3ddce53876b05d5e24c8d8f52
          git clone https://github.com/lokedhs/cl-rabbit.git \
            "$HOME/quicklisp/local-projects/cl-rabbit"
          git -C "$HOME/quicklisp/local-projects/cl-rabbit" \
            checkout 9603204715bb13f09243dc286c5ad4bd51b4fd7b
      - name: Patch unused Cl-Couch legacy dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          root = Path.home() / "quicklisp/local-projects/Cl-Couch"
          asd = root / "cl-couchdb-client.asd"
          package = root / "cl-couchdb-client.lisp"

          asd_text = asd.read_text()
          old_dependencies = ":depends-on (:iterate :drakma :cl-json :defclass-star :logv)"
          if old_dependencies not in asd_text:
              raise SystemExit("Cl-Couch dependency declaration changed")
          asd.write_text(asd_text.replace(
              old_dependencies,
              ":depends-on (:iterate :drakma :cl-json)"))

          package_text = package.read_text()
          old_use = "(:use :cl :iterate :json :defclass-star :logv)"
          if old_use not in package_text:
              raise SystemExit("Cl-Couch package declaration changed")
          package_text = package_text.replace(old_use, "(:use :cl :iterate :json)")
          package_text = package_text.replace("(setf logv:*log-output* nil)\n", "")
          package.write_text(package_text)
          PY
      - name: Run live data adapter integration
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/run-data-adapters-integration.lisp \
            2>&1 | tee star-lang-data-adapters-integration.log
      - name: Upload data adapter integration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: star-lang-data-adapters-integration-log
          path: star-lang-data-adapters-integration.log
          if-no-files-found: error
