name: Star-Lang BBP Domain Remoting

on:
  pull_request:
    paths:
      - "prototypes/star-lang/fixtures/bbp-domain.star"
      - "prototypes/star-lang/common-lisp/domain-server-core-prototype.lisp"
      - "prototypes/star-lang/common-lisp/bbp-domain-server-prototype.lisp"
      - "prototypes/star-lang/common-lisp/domain-remoting-prototype.lisp"
      - "prototypes/star-lang/common-lisp/domain-remoting-config-prototype.lisp"
      - "prototypes/star-lang/common-lisp/domain-remoting-lease-prototype.lisp"
      - "prototypes/star-lang/common-lisp/sento-remoting-domain-adapter.lisp"
      - "prototypes/star-lang/common-lisp/bbp-remoting-runtime-example.lisp"
      - "prototypes/star-lang/common-lisp/bbp-domain-remoting-tests.lisp"
      - "prototypes/star-lang/common-lisp/domain-remoting-config-tests.lisp"
      - "prototypes/star-lang/common-lisp/domain-remoting-lease-tests.lisp"
      - "prototypes/star-lang/common-lisp/bbp-sento-smoke-main.lisp"
      - "prototypes/star-lang/common-lisp/bbp-sento-smoke-worker.lisp"
      - ".github/workflows/star-lang-bbp-domain.yml"
  push:
    branches:
      - main
    paths:
      - "prototypes/star-lang/fixtures/bbp-domain.star"
      - "prototypes/star-lang/common-lisp/domain-server-core-prototype.lisp"
      - "prototypes/star-lang/common-lisp/bbp-domain-server-prototype.lisp"
      - "prototypes/star-lang/common-lisp/domain-remoting-prototype.lisp"
      - "prototypes/star-lang/common-lisp/domain-remoting-config-prototype.lisp"
      - "prototypes/star-lang/common-lisp/domain-remoting-lease-prototype.lisp"
      - "prototypes/star-lang/common-lisp/sento-remoting-domain-adapter.lisp"
      - "prototypes/star-lang/common-lisp/bbp-remoting-runtime-example.lisp"
      - "prototypes/star-lang/common-lisp/bbp-domain-remoting-tests.lisp"
      - "prototypes/star-lang/common-lisp/domain-remoting-config-tests.lisp"
      - "prototypes/star-lang/common-lisp/domain-remoting-lease-tests.lisp"
      - "prototypes/star-lang/common-lisp/bbp-sento-smoke-main.lisp"
      - "prototypes/star-lang/common-lisp/bbp-sento-smoke-worker.lisp"
      - ".github/workflows/star-lang-bbp-domain.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install --yes sbcl
      - name: Verify Quicklisp bootstrap
        run: |
          curl --fail --silent --show-error --location \
            --output quicklisp.lisp \
            https://beta.quicklisp.org/quicklisp.lisp
          echo "4a7a5c2aebe0716417047854267397e24a44d0cce096127411e9ce9ccfeb2c17  quicklisp.lisp" \
            | sha256sum --check --strict
      - name: Install Quicklisp
        run: |
          sbcl --non-interactive \
            --load quicklisp.lisp \
            --eval '(quicklisp-quickstart:install :path #P"/home/runner/quicklisp/")'
          test -f /home/runner/quicklisp/setup.lisp
      - name: Checkout pinned Sento remoting dependencies
        run: |
          git clone --no-checkout \
            https://github.com/mdbergmann/cl-gserver.git \
            /home/runner/quicklisp/local-projects/cl-gserver
          git -C /home/runner/quicklisp/local-projects/cl-gserver \
            checkout a889b8375709ca9396bba5d06b6e460689a23716

          git clone --no-checkout \
            https://github.com/Shinmera/precise-time.git \
            /home/runner/quicklisp/local-projects/precise-time
          git -C /home/runner/quicklisp/local-projects/precise-time \
            checkout e0bf77d7c200913c0b7920363c26e89ab68c03ad

          git clone --no-checkout \
            https://github.com/atgreen/cl-cancel.git \
            /home/runner/quicklisp/local-projects/cl-cancel
          git -C /home/runner/quicklisp/local-projects/cl-cancel \
            checkout bec34fb37fe713746bdeefaf542f578d174d9ffa

          git clone --no-checkout \
            https://github.com/atgreen/pure-tls.git \
            /home/runner/quicklisp/local-projects/pure-tls
          git -C /home/runner/quicklisp/local-projects/pure-tls \
            checkout d985aeaed8336dc6f88eadef5b80741fe22f4b21

          test -f /home/runner/quicklisp/local-projects/cl-gserver/sento-remoting.asd
          test -f /home/runner/quicklisp/local-projects/precise-time/precise-time.asd
          test -f /home/runner/quicklisp/local-projects/cl-cancel/cl-cancel.asd
          test -f /home/runner/quicklisp/local-projects/pure-tls/pure-tls.asd
      - name: Load pinned Sento core
        shell: bash
        run: |
          set -o pipefail
          sbcl --non-interactive \
            --load /home/runner/quicklisp/setup.lisp \
            --eval '(ql:register-local-projects)' \
            --eval '(ql:quickload :sento)' \
            2>&1 | tee star-lang-sento-core-load.log
      - name: Load pinned pure-tls dependency
        shell: bash
        run: |
          set -o pipefail
          sbcl --non-interactive \
            --load /home/runner/quicklisp/setup.lisp \
            --eval '(ql:register-local-projects)' \
            --eval '(ql:quickload :pure-tls)' \
            2>&1 | tee star-lang-pure-tls-load.log
      - name: Load pinned Sento remoting
        shell: bash
        run: |
          set -o pipefail
          sbcl --non-interactive \
            --load /home/runner/quicklisp/setup.lisp \
            --eval '(ql:register-local-projects)' \
            --eval '(ql:quickload :sento-remoting)' \
            2>&1 | tee star-lang-sento-remoting-load.log
      - name: Check BBP Lisp form balance
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path('prototypes/star-lang/common-lisp/domain-server-core-prototype.lisp'),
              Path('prototypes/star-lang/common-lisp/bbp-domain-server-prototype.lisp'),
              Path('prototypes/star-lang/common-lisp/domain-remoting-prototype.lisp'),
              Path('prototypes/star-lang/common-lisp/domain-remoting-config-prototype.lisp'),
              Path('prototypes/star-lang/common-lisp/domain-remoting-lease-prototype.lisp'),
              Path('prototypes/star-lang/common-lisp/sento-remoting-domain-adapter.lisp'),
              Path('prototypes/star-lang/common-lisp/bbp-remoting-runtime-example.lisp'),
              Path('prototypes/star-lang/common-lisp/bbp-domain-remoting-tests.lisp'),
              Path('prototypes/star-lang/common-lisp/domain-remoting-config-tests.lisp'),
              Path('prototypes/star-lang/common-lisp/domain-remoting-lease-tests.lisp'),
              Path('prototypes/star-lang/common-lisp/bbp-sento-smoke-main.lisp'),
              Path('prototypes/star-lang/common-lisp/bbp-sento-smoke-worker.lisp'),
          ]

          for path in paths:
              text = path.read_text(encoding='utf-8')
              stack = []
              in_string = False
              escaped = False
              in_comment = False
              line = 1
              for char in text:
                  if char == '\n':
                      line += 1
                      in_comment = False
                      continue
                  if in_comment:
                      continue
                  if in_string:
                      if escaped:
                          escaped = False
                      elif char == '\\':
                          escaped = True
                      elif char == '"':
                          in_string = False
                      continue
                  if char == ';':
                      in_comment = True
                  elif char == '"':
                      in_string = True
                  elif char == '(':
                      stack.append(line)
                  elif char == ')':
                      if not stack:
                          raise SystemExit(f'{path}:{line}: unmatched closing parenthesis')
                      stack.pop()
              if in_string:
                  raise SystemExit(f'{path}: unterminated string')
              if stack:
                  raise SystemExit(f'{path}:{stack[-1]}: unclosed parenthesis')
              print(f'{path}: balanced')
          PY
      - name: Run BBP domain and remoting suite
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/bbp-domain-remoting-tests.lisp \
            2>&1 | tee star-lang-bbp-domain-remoting.log
          sbcl --script prototypes/star-lang/common-lisp/domain-remoting-config-tests.lisp \
            2>&1 | tee star-lang-domain-remoting-config.log
          sbcl --script prototypes/star-lang/common-lisp/domain-remoting-lease-tests.lisp \
            2>&1 | tee star-lang-domain-remoting-lease.log
          python -m json.tool star-lang-bbp-domain-manifest.json >/dev/null
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('star-lang-bbp-remote-trace.ndjson')
          lines = path.read_text(encoding='utf-8').splitlines()
          if not lines:
              raise SystemExit('BBP remoting trace is empty')
          for line in lines:
              json.loads(line)
          print(f'validated {len(lines)} BBP lifecycle envelopes')
          PY
      - name: Run live two-process Sento smoke test
        shell: bash
        run: |
          set -euo pipefail
          rm -f bbp-sento-main.ready \
                bbp-sento-worker.ready \
                bbp-sento-worker.stop \
                bbp-sento-smoke.success

          main_pid=""
          worker_pid=""
          cleanup() {
            if [[ -n "$main_pid" ]]; then
              kill "$main_pid" 2>/dev/null || true
            fi
            if [[ -n "$worker_pid" ]]; then
              kill "$worker_pid" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          sbcl --load /home/runner/quicklisp/setup.lisp \
            --script prototypes/star-lang/common-lisp/bbp-sento-smoke-main.lisp \
            > star-lang-bbp-sento-main.log 2>&1 &
          main_pid=$!

          for _ in $(seq 1 200); do
            [[ -f bbp-sento-main.ready ]] && break
            kill -0 "$main_pid" 2>/dev/null || {
              cat star-lang-bbp-sento-main.log
              exit 1
            }
            sleep 0.05
          done
          [[ -f bbp-sento-main.ready ]]

          sbcl --load /home/runner/quicklisp/setup.lisp \
            --script prototypes/star-lang/common-lisp/bbp-sento-smoke-worker.lisp \
            > star-lang-bbp-sento-worker.log 2>&1 &
          worker_pid=$!

          wait "$main_pid"
          main_pid=""
          wait "$worker_pid"
          worker_pid=""
          [[ -f bbp-sento-smoke.success ]]
      - name: Upload BBP test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: star-lang-bbp-domain-remoting
          path: |
            star-lang-sento-core-load.log
            star-lang-pure-tls-load.log
            star-lang-sento-remoting-load.log
            star-lang-bbp-domain-remoting.log
            star-lang-domain-remoting-config.log
            star-lang-domain-remoting-lease.log
            star-lang-bbp-sento-main.log
            star-lang-bbp-sento-worker.log
            star-lang-bbp-domain-manifest.json
            star-lang-bbp-remote-trace.ndjson
          if-no-files-found: warn
