name: Star-Lang Common Lisp Baseline

on:
  pull_request:
    paths:
      - "prototypes/star-lang/common-lisp/**"
      - "prototypes/star-lang/fixtures/**"
      - ".github/workflows/star-lang-common-lisp.yml"
  push:
    branches:
      - main
    paths:
      - "prototypes/star-lang/common-lisp/**"
      - "prototypes/star-lang/fixtures/**"
      - ".github/workflows/star-lang-common-lisp.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install --yes sbcl
      - name: Run existing Common Lisp baseline
        run: sbcl --script prototypes/star-lang/common-lisp/tests.lisp
      - name: Load specification and domain prototype
        run: sbcl --noinform --disable-debugger --load prototypes/star-lang/common-lisp/spec-domain-prototype.lisp --quit
      - name: Test remote digest requirement
        run: sbcl --noinform --disable-debugger --load prototypes/star-lang/common-lisp/spec-domain-prototype.lisp --eval '(star-lang.spec-domain.prototype::test-remote-library-requires-digest)' --quit
      - name: Test import lock mismatch
        run: sbcl --noinform --disable-debugger --load prototypes/star-lang/common-lisp/spec-domain-prototype.lisp --eval '(star-lang.spec-domain.prototype::test-import-lock-mismatch-rejected)' --quit
      - name: Test exact import lock
        run: sbcl --noinform --disable-debugger --load prototypes/star-lang/common-lisp/spec-domain-prototype.lisp --eval '(star-lang.spec-domain.prototype::test-exact-import-lock-accepted)' --quit
      - name: Test additive extension
        run: sbcl --noinform --disable-debugger --load prototypes/star-lang/common-lisp/spec-domain-prototype.lisp --eval '(star-lang.spec-domain.prototype::test-extension-is-additive)' --quit
      - name: Test relation type constraints
        run: sbcl --noinform --disable-debugger --load prototypes/star-lang/common-lisp/spec-domain-prototype.lisp --eval '(star-lang.spec-domain.prototype::test-relation-type-constraints)' --quit
      - name: Test dataset destination filter
        run: sbcl --noinform --disable-debugger --load prototypes/star-lang/common-lisp/spec-domain-prototype.lisp --eval '(star-lang.spec-domain.prototype::test-dataset-destination-filter)' --quit
      - name: Test email actor output
        run: sbcl --noinform --disable-debugger --load prototypes/star-lang/common-lisp/spec-domain-prototype.lisp --eval '(star-lang.spec-domain.prototype::test-email-actor-output)' --quit
      - name: Test domain-server metadata
        run: sbcl --noinform --disable-debugger --load prototypes/star-lang/common-lisp/spec-domain-prototype.lisp --eval '(star-lang.spec-domain.prototype::test-domain-server-metadata)' --quit
      - name: Run specification and domain test script
        run: sbcl --script prototypes/star-lang/common-lisp/spec-domain-tests.lisp
