name: One-shot Quasar boundary correction

on:
  push:
    branches:
      - research/quasar-product-architecture
    paths:
      - .github/workflows/quasar-boundary-correction.yml

permissions:
  contents: write

jobs:
  correct:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/quasar-product-architecture
          fetch-depth: 0

      - name: Correct Quasar ownership language
        shell: python
        run: |
          from pathlib import Path
          import re

          paths = [
              Path("roam/research/star-server/QUASAR-RESEARCH-000-investigation-workspace-architecture.org"),
              Path("roam/research/star-server/QUASAR-RESEARCH-001-transform-automation-catalog.org"),
              Path("roam/research/star-server/QUASAR-RESEARCH-002-client-library-stack.org"),
              Path("roam/design/star-server/QUASAR-001-basic-typed-graph-editor.org"),
              Path("roam/indexes/star-server/STAR-INDEX-000-fourth-generation.org"),
          ]

          correction = """* Corrected Ownership Boundary

          Quasar owns graph actions, transforms, action discovery, action invocation, graph-operation batches, renderer integration, and undo grouping.

          Star-Lang does not provide Quasar transforms or context-menu actions. Star-Lang owns typed document and relation specifications, specification libraries, datasets, actors, declarative playbooks, and resumable analysis-run semantics. A Star-Lang playbook may invoke a registered Quasar action through an explicit adapter, but the action remains a Quasar extension or external integration.

          Any older transform wording in this note must be read under this boundary.

          """

          common = {
              "Star-Lang transforms": "Quasar transforms",
              "Star-Lang transform": "Quasar transform",
              "Star-Lang actions": "Quasar actions",
              "Star-Lang action": "Quasar action",
              "Star-Lang graph batches": "Quasar graph batches",
              "Star-Lang graph batch": "Quasar graph batch",
              "Star-Lang graph-batch": "Quasar graph-batch",
              "Star-Lang transform runner": "Quasar action runner",
              "Star-Lang action registry": "Quasar action registry",
              "Star-Lang transform registry": "Quasar transform registry",
          }

          for path in paths:
              text = path.read_text()
              text = text.replace("#+last_modified: [2026-07-22 Wed]", "#+last_modified: [2026-07-23 Thu]")
              for old, new in common.items():
                  text = text.replace(old, new)

              if path.name.startswith("QUASAR-RESEARCH-") and "* Corrected Ownership Boundary" not in text:
                  marker = "* Related Nodes\n"
                  if marker not in text:
                      raise SystemExit(f"missing insertion marker in {path}")
                  text = text.replace(marker, correction + marker, 1)

              if path.name.startswith("QUASAR-RESEARCH-000"):
                  text = text.replace(
                      "Use the same action definitions for context menus, intermediate commands, the Lisp shell, application programming interfaces, actors, and Star-Lang.",
                      "Use the same Quasar action definitions for context menus, intermediate commands, the Lisp shell, application programming interfaces, and adapters. Star-Lang may invoke a registered Quasar action only through an explicit integration boundary."
                  )
                  text = text.replace(
                      "Replace fragile transform macros with resumable Star-Lang playbooks[fn:playbook].",
                      "Replace fragile transform macros with Quasar action declarations. Star-Lang playbooks[fn:playbook] may orchestrate registered Quasar actions through an adapter, but do not define the transforms."
                  )
                  replacement = """* Quasar Actions and Star-Lang Playbooks

          Quasar defines and registers transforms. Star-Lang does not contain a Quasar transform declaration form.

          Star-Lang may still own a declarative playbook that invokes registered Quasar actions through an adapter. In that arrangement:

          - Quasar owns action identity, accepted graph selection, parameters, execution adapter, progress, cancellation, returned graph operations, and undo grouping;
          - Star-Lang owns playbook branching, dependencies, retries, checkpoints, resume behavior, and execution-graph state;
          - the adapter converts Star-Lang typed inputs into a Quasar action request and converts the Quasar result into typed playbook output;
          - neither layer mutates Cytoscape directly.

          A conceptual boundary is:

          #+begin_src text
          Star-Lang playbook run
                  |
                  | invoke registered action
                  v
          Quasar action registry
                  |
                  | execute extension / external integration
                  v
          Quasar graph-operation batch
                  |
                  v
          graph editor validation and application
          #+end_src

          """
                  text = re.sub(
                      r"(?ms)^\* Playbooks and Star-Lang\n.*?(?=^\* |\Z)",
                      replacement,
                      text,
                      count=1,
                  )

              if path.name.startswith("QUASAR-RESEARCH-001"):
                  text = text.replace(
                      "#+description: Concrete Maltego-inspired transform families, automation semantics, auto-expansion rules, and Star-Lang playbooks for Quasar.",
                      "#+description: Concrete Maltego-inspired Quasar extension families, automation semantics, auto-expansion rules, and optional Star-Lang playbook orchestration."
                  )
                  text = text.replace(
                      "Transforms are ordinary typed StarIntel actions. They may run interactively, in bulk, on schedules, from graph conditions, from actor events, or inside Star-Lang playbooks. Their results persist directly into the workspace with provenance and run metadata.",
                      "Transforms are Quasar-owned extensions or external integrations. They may run interactively, in bulk, on schedules, from graph conditions, from external events, or when invoked by a Star-Lang playbook through an adapter. Their results return through the Quasar action API and are applied to the graph with run metadata."
                  )
                  text = text.replace(
                      "- direct integration with Star-Lang, domain servers, generated bindings, and the actor lifecycle protocol;",
                      "- interoperability with Star-Lang typed data and optional playbook orchestration, plus adapters to existing services where useful;"
                  )
                  text = text.replace(
                      "- implementation actor or domain server;",
                      "- implementation adapter: in-process function, subprocess, HTTP integration, existing actor or service, or optional domain server;"
                  )
                  text = text.replace(
                      "Composes transforms with branches, loops, concurrency, retries, checkpoints, cancellation, restart handling, and optional pause points.",
                      "A Quasar machine or a Star-Lang playbook may compose registered Quasar transforms with branches, loops, concurrency, retries, checkpoints, cancellation, restart handling, and optional pause points. Star-Lang owns orchestration semantics, not transform definitions."
                  )
                  text = text.replace("Every transform definition should declare:", "Every Quasar transform definition should declare:")
                  text = text.replace("(transform ", "(quasar-transform ")
                  text = text.replace("(action ", "(quasar-action ")

              if path.name.startswith("QUASAR-RESEARCH-002"):
                  text = text.replace(
                      "- transform and playbook definitions;",
                      "- Quasar action manifests and Star-Lang playbook definitions;"
                  )
                  text = text.replace("- transform invocation lifecycle;", "- Quasar action invocation lifecycle;")
                  text = text.replace("- transform-menu ranking;", "- Quasar action-menu ranking;")
                  text = text.replace("- streaming transform results;", "- streaming Quasar action results;")
                  text = text.replace("- transform menu from the action registry;", "- Quasar action menu from the Quasar action registry;")

              path.write_text(text)

          forbidden = [
              re.compile(r"Star-Lang transform", re.I),
              re.compile(r"Star-Lang action", re.I),
              re.compile(r"Star-Lang graph[- ]batch", re.I),
              re.compile(r"Star-Lang transform registry", re.I),
          ]
          failures = []
          for path in paths:
              text = path.read_text()
              for pattern in forbidden:
                  if pattern.search(text):
                      failures.append(f"{path}: {pattern.pattern}")
          if failures:
              raise SystemExit("uncorrected ownership language:\n" + "\n".join(failures))

          workflow = Path(".github/workflows/quasar-boundary-correction.yml")
          workflow.unlink()

      - name: Commit corrected documents
        run: |
          git config user.name "quasar-correction-bot"
          git config user.email "quasar-correction-bot@users.noreply.github.com"
          git add -A
          git commit -m "Correct Quasar and Star-Lang ownership boundary"
          git push origin HEAD:research/quasar-product-architecture
