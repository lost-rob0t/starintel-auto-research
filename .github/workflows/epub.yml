name: Kindle EPUB

on:
  push:
    branches: [main]
    paths:
      - "roam/**"
      - "epub/**"
      - "scripts/build-epub"
      - "scripts/build_epub.py"
      - ".github/workflows/epub.yml"
      - "README.md"
      - "README.org"
  pull_request:
    branches: [main]
    paths:
      - "roam/**"
      - "epub/**"
      - "scripts/build-epub"
      - "scripts/build_epub.py"
      - ".github/workflows/epub.yml"
      - "README.md"
      - "README.org"
  workflow_dispatch:

permissions:
  contents: read

env:
  EPUBCHECK_VERSION: "5.3.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install EPUB tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install --yes --quiet pandoc default-jre-headless unzip
          curl --fail --silent --show-error --location \
            "https://github.com/w3c/epubcheck/releases/download/v${EPUBCHECK_VERSION}/epubcheck-${EPUBCHECK_VERSION}.zip" \
            --output /tmp/epubcheck.zip
          unzip -q /tmp/epubcheck.zip -d /tmp
          sudo mv "/tmp/epubcheck-${EPUBCHECK_VERSION}" /opt/epubcheck
          printf 'EPUBCHECK_JAR=/opt/epubcheck/epubcheck.jar\n' >> "$GITHUB_ENV"
          pandoc --version | head -1
          java -jar /opt/epubcheck/epubcheck.jar --version

      - name: Check EPUB builder syntax
        run: python3 -m py_compile scripts/build_epub.py

      - name: Build Kindle EPUB
        run: bash scripts/build-epub

      - name: Validate EPUB
        run: java -jar "$EPUBCHECK_JAR" _exports/starintel-second-brain.epub

      - name: Upload Kindle EPUB
        uses: actions/upload-artifact@v4
        with:
          name: starintel-kindle-epub
          path: _exports/starintel-second-brain.epub
          if-no-files-found: error
          retention-days: 30
