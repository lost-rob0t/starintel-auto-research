name: One-shot Quasar core boundary correction

on:
  push:
    branches:
      - research/quasar-product-architecture
    paths:
      - .github/workflows/quasar-core-boundary-correction.yml

permissions:
  contents: write

jobs:
  correct:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/quasar-product-architecture
          fetch-depth: 0

      - name: Correct Quasar core architecture
        shell: python
        run: |
          from pathlib import Path
          import re

          q000 = Path("roam/research/star-server/QUASAR-RESEARCH-000-investigation-workspace-architecture.org")
          q001 = Path("roam/research/star-server/QUASAR-RESEARCH-001-transform-automation-catalog.org")
          q002 = Path("roam/research/star-server/QUASAR-RESEARCH-002-client-library-stack.org")

          text = q000.read_text()
          text = text.replace(
              "#+description: Research and architecture decisions for turning the original Quasar graph-interface concept into an automation-first, typed, provenance-aware, extensible StarIntel investigation workspace.",
              "#+description: Historical research for Quasar graph editing and optional advanced investigation features; QUASAR-001 defines the basic typed graph editor as the core product."
          )
          text = text.replace(
              "Any older transform wording in this note must be read under this boundary.",
              "Any older transform wording in this note must be read under this boundary. QUASAR-001 also supersedes any statement here that makes StarIntel, Star-Lang runtime services, domain servers, evidence models, casework, or distributed automation prerequisites for the editor."
          )
          text = text.replace(
              "These constraints remain valid. The missing work was the model underneath the graph: investigations, source records, claims, evidence, job state, automation, permissions, rollback, and reproducibility.",
              "The graph-interface constraints remain valid. The first missing work is the graph-document model, typed nodes and edges, editing commands, persistence, layout, import, export, and undo. Investigations, claims, evidence, automation, permissions, and reproducibility are optional layers added only after the editor works."
          )
          text = text.replace(
              "Quasar should be an automation-first typed investigation workspace, not merely a graph canvas with tool callbacks.",
              "Quasar should be a basic local-first typed graph editor. Automation, evidence handling, casework, and additional projections are optional extensions around that editor."
          )
          text = text.replace(
              "A bounded workspace in which automated and manual activity share one typed model, and every visible object, relationship, property, action, search, and conclusion can be traced to its source and reproduced.",
              "A graph-document editor in which users can create, inspect, connect, arrange, save, load, import, export, undo, and optionally extend typed nodes and edges."
          )
          text = text.replace(
              "The graph is one projection[fn:projection] of that workspace. Tables, maps, timelines, documents, evidence, jobs, and findings must operate on the same selections and object identifiers.",
              "The graph document is the core product model. Tables, maps, timelines, evidence views, jobs, and findings may later project or reference the same identifiers, but they are not prerequisites for the graph editor."
          )
          text = text.replace("* Workspace Model", "* Optional Advanced Workspace Model")
          text = text.replace("* Object, Claim, and Evidence Model", "* Optional Object, Claim, and Evidence Model")
          text = text.replace(
              "A workspace contains:",
              "An optional advanced investigation workspace may contain:"
          )
          text = text.replace(
              "Opening a workspace restores query definitions, layout overrides, selections, filters, panels, active jobs, run output, and actor state. It does not copy the entire StarIntel database into a graphical file.",
              "The basic editor only needs to restore graph contents, layout, selection, filters, and view state. Advanced workspaces may additionally restore queries, jobs, run output, evidence, and external integration state."
          )
          q000.write_text(text)

          text = q001.read_text()
          text = text.replace(
              "Any older transform wording in this note must be read under this boundary.",
              "Any older transform wording in this note must be read under this boundary. This catalog is an optional Quasar extension backlog, not a requirement for the basic graph editor MVP."
          )
          text = text.replace(
              "- durable run state and checkpoint replay;",
              "- optional durable run state and checkpoint replay after the editor MVP;"
          )
          text = text.replace(
              "- triggers and feeders as implemented actor primitives;",
              "- optional triggers and feeders implemented only when a concrete integration requires them;"
          )
          text = text.replace(
              "- automatic continuation policies;",
              "- optional automatic continuation policies with explicit bounds;"
          )
          q001.write_text(text)

          text = q002.read_text()
          text = text.replace(
              "Quasar should use a browser-first TypeScript client served by the existing StarIntel backend.",
              "Quasar should use a browser-first TypeScript client served by a thin Common Lisp Quasar graph-document service. StarIntel is an optional integration, not the required backend."
          )
          text = text.replace(
              "- native Fetch and WebSocket transport using generated Star-Lang TypeScript bindings;",
              "- native Fetch and WebSocket transport using Quasar protocol types; generated Star-Lang bindings are used only by optional interoperability adapters;"
          )
          text = text.replace(
              "The backend remains Common Lisp, cl-gserver/Sento, Star-Lang domain servers, and external supervised workers. Quasar must not introduce a Node.js business-logic backend or a second schema system.",
              "The core backend is a thin Common Lisp Quasar service for graph documents, commands, revisions, persistence, and optional Quasar actions. cl-gserver/Sento, Star-Lang runtimes, domain servers, and external workers are optional adapters. Quasar must not introduce a Node.js business-logic backend."
          )
          text = text.replace(
              "The client is a projection and control surface over StarIntel domain servers. It does not become the canonical object store, graph database, workflow engine, policy engine, or actor supervisor.",
              "The client is an interactive editor for Quasar graph documents backed by the thin Quasar service. It is not a workflow engine, policy engine, actor supervisor, or mandatory projection over StarIntel domain servers."
          )
          old_backend = """The backend owns:

          - canonical objects and source records;
          - claims and evidence;
          - transform and playbook execution;
          - actor lifecycle;
          - action permissions and capabilities;
          - durable workspace journal;
          - graph, table, map, and timeline projection queries;
          - direct automated result persistence;
          - cancellation, retry, checkpoints, and rollback records."""
          new_backend = """The Quasar service owns:

          - graph documents, typed nodes, and typed edges;
          - graph commands, batches, revisions, undo, and redo;
          - graph-document persistence, import, and export;
          - Quasar action discovery and result validation when actions are installed;
          - live graph-change events and reconnect by revision.

          StarIntel objects, claims, evidence, actors, playbooks, checkpoints, and domain services remain optional integration concerns."""
          text = text.replace(old_backend, new_backend)
          text = text.replace(
              "Use TypeScript as the client language because the repository already generates TypeScript contracts from the Star-Lang portable manifest.",
              "Use TypeScript as the client language for strict client and protocol typing. Optional Star-Lang adapters may import generated TypeScript contracts from the Star-Lang portable manifest."
          )
          text = text.replace(
              "The initial Quasar client runs as a normal browser application served by the local StarIntel HTTP service.",
              "The initial Quasar client runs as a normal browser application served by the local Quasar HTTP service."
          )
          text = text.replace(
              "- launch or discover the local StarIntel backend;",
              "- launch or discover the local Quasar service;"
          )
          backend_section = """* Backend Libraries and Boundaries

          The core Quasar backend is deliberately small:

          - Common Lisp graph-document model;
          - graph command and revision application;
          - graph-document storage;
          - Quasar action registry and adapters when installed;
          - HTTP request-response endpoints;
          - WebSocket graph-change and action-progress events.

          The core does not require cl-gserver, Sento, a Star-Lang runtime, domain-server manifests, remoting, ZeroMQ, or supervised external workers.

          Optional adapters may connect Quasar to:

          - Star-Lang typed documents, relations, datasets, and generated bindings;
          - Star-Lang playbook runs that invoke registered Quasar actions;
          - StarIntel search and import services;
          - existing actors, subprocesses, HTTP services, or domain servers.

          No Node.js API server is added. The Quasar browser contract remains independent from optional execution infrastructure.

          """
          text = re.sub(
              r"(?ms)^\* Backend Libraries and Boundaries\n.*?(?=^\* Client Persistence)",
              backend_section,
              text,
              count=1,
          )
          text = text.replace("- transform catalog queries;", "- Quasar action-catalog queries;")
          text = text.replace("- actor and run status;", "- optional action and external-run status;")
          q002.write_text(text)

          workflow = Path(".github/workflows/quasar-core-boundary-correction.yml")
          workflow.unlink()

      - name: Commit corrected core boundary
        run: |
          git config user.name "quasar-correction-bot"
          git config user.email "quasar-correction-bot@users.noreply.github.com"
          git add -A
          git commit -m "Make the graph editor the Quasar core"
          git push origin HEAD:research/quasar-product-architecture
