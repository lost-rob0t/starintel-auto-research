name: Star-Lang Common Lisp Core

on:
  pull_request:
    paths:
      - "prototypes/star-lang/common-lisp/**"
      - "prototypes/star-lang/fixtures/**"
      - ".github/workflows/star-lang-common-lisp.yml"
  push:
    branches:
      - main
    paths:
      - "prototypes/star-lang/common-lisp/**"
      - "prototypes/star-lang/fixtures/**"
      - ".github/workflows/star-lang-common-lisp.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install --yes sbcl
      - name: Run Star-Lang ASDF tests
        run: sbcl --script prototypes/star-lang/common-lisp/run-tests.lisp
