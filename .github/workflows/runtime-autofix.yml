name: Runtime Autofix

on:
  pull_request:
    paths:
      - ".github/workflows/runtime-autofix.yml"
      - "prototypes/star-lang/common-lisp/document-runtime.lisp"

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Apply exact form-balance correction
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('prototypes/star-lang/common-lisp/document-runtime.lisp')
          text = path.read_text(encoding='utf-8')
          old = '''         (otherwise
          nil))))))

(defun validate-document'''
          new = '''         (otherwise
          nil)))))))

(defun validate-document'''
          count = text.count(old)
          if count == 1:
              path.write_text(text.replace(old, new), encoding='utf-8')
          elif count == 0 and new in text:
              print('runtime already fixed')
          else:
              raise SystemExit(f'unexpected validator tail count: {count}')
          PY
      - name: Commit correction when needed
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add prototypes/star-lang/common-lisp/document-runtime.lisp
          git commit -m "Fix document runtime validator balance"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
