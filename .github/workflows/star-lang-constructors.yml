name: Star-Lang Constructors

on:
  pull_request:
    paths:
      - "prototypes/star-lang/common-lisp/constructor-runtime.lisp"
      - "prototypes/star-lang/common-lisp/constructor-runtime-tests.lisp"
      - "prototypes/star-lang/common-lisp/star-lang-api.lisp"
      - "prototypes/star-lang/common-lisp/run-star.lisp"
      - "prototypes/star-lang/fixtures/star-cl-constructors.star"
      - "prototypes/star-lang/fixtures/star-cl.star"
      - ".github/workflows/star-lang-constructors.yml"
  push:
    branches:
      - main
    paths:
      - "prototypes/star-lang/common-lisp/constructor-runtime.lisp"
      - "prototypes/star-lang/common-lisp/constructor-runtime-tests.lisp"
      - "prototypes/star-lang/common-lisp/star-lang-api.lisp"
      - "prototypes/star-lang/common-lisp/run-star.lisp"
      - "prototypes/star-lang/fixtures/star-cl-constructors.star"
      - "prototypes/star-lang/fixtures/star-cl.star"
      - ".github/workflows/star-lang-constructors.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install --yes sbcl coreutils
      - name: Check constructor Lisp form balance
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in [
              Path('prototypes/star-lang/common-lisp/constructor-runtime.lisp'),
              Path('prototypes/star-lang/common-lisp/constructor-runtime-tests.lisp'),
              Path('prototypes/star-lang/common-lisp/star-lang-api.lisp'),
          ]:
              text = path.read_text(encoding='utf-8')
              stack = []
              in_string = False
              escaped = False
              in_comment = False
              line = 1
              for char in text:
                  if char == '\n':
                      line += 1
                      in_comment = False
                      continue
                  if in_comment:
                      continue
                  if in_string:
                      if escaped:
                          escaped = False
                      elif char == '\\':
                          escaped = True
                      elif char == '"':
                          in_string = False
                      continue
                  if char == ';':
                      in_comment = True
                  elif char == '"':
                      in_string = True
                  elif char == '(':
                      stack.append(line)
                  elif char == ')':
                      if not stack:
                          raise SystemExit(f'{path}:{line}: unmatched closing parenthesis')
                      stack.pop()
              if stack:
                  raise SystemExit(f'{path}:{stack[-1]}: unclosed parenthesis')
              print(f'{path}: balanced')
          PY
      - name: Run generated constructor compatibility suite
        shell: bash
        run: |
          set -o pipefail
          sbcl --script prototypes/star-lang/common-lisp/constructor-runtime-tests.lisp \
            2>&1 | tee star-lang-constructors.log
      - name: Verify CLI remains a Lisp API adapter
        run: |
          grep -q 'star-lang.api:load-star-file' \
            prototypes/star-lang/common-lisp/run-star.lisp
          grep -q 'star-lang.api:load-star-url' \
            prototypes/star-lang/common-lisp/run-star.lisp
      - name: Upload constructor logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: star-lang-constructor-logs
          path: star-lang-constructors.log
          if-no-files-found: warn
