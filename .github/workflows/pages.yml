name: Org-roam Pages

on:
  push:
    branches: [main]
    paths:
      - "roam/**"
      - "lisp/starintel/**"
      - "pages/**"
      - "scripts/publish-pages"
      - "scripts/configure-pages"
      - "scripts/check-pages-links.py"
      - ".github/workflows/pages.yml"
      - "AGENTS.md"
      - "README.org"
      - "README.md"
  pull_request:
    branches: [main]
    paths:
      - "roam/**"
      - "lisp/starintel/**"
      - "pages/**"
      - "scripts/publish-pages"
      - "scripts/configure-pages"
      - "scripts/check-pages-links.py"
      - ".github/workflows/pages.yml"
      - "AGENTS.md"
      - "README.org"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Emacs
        run: |
          sudo apt-get update -qq >/tmp/apt-update.log
          sudo DEBIAN_FRONTEND=noninteractive apt-get install --yes --quiet emacs-nox sqlite3 >/tmp/apt-install.log
          emacs --version | head -1

      - name: Build Org-roam site
        shell: bash
        run: |
          set +e
          bash scripts/publish-pages >pages-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::group::Emacs build failure"
            tail -n 20 pages-build.log
            echo "::endgroup::"
            exit "$status"
          fi
          tail -n 20 pages-build.log

      - name: Check internal links
        run: python3 scripts/check-pages-links.py _site

      - name: Verify GitHub Pages is enabled
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh api "repos/${GITHUB_REPOSITORY}/pages" >/tmp/pages.json 2>/tmp/pages-error.log; then
            cat /tmp/pages-error.log
            echo "::error::GitHub Pages is not enabled for workflow publishing. Run 'bash scripts/configure-pages' once with an administrator-authenticated gh CLI, then rerun this workflow."
            exit 1
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path

          pages = json.loads(Path('/tmp/pages.json').read_text())
          build_type = pages.get('build_type')
          if build_type != 'workflow':
              raise SystemExit(
                  "GitHub Pages exists but build_type is not 'workflow'. "
                  "Run 'bash scripts/configure-pages' once."
              )
          print(f"GitHub Pages enabled: {pages.get('html_url', 'URL pending')}")
          PY

      - name: Configure GitHub Pages metadata
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
